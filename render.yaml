services:
  - type: web
    name: studlyf-hr-platform
    env: node
    rootDir: backend-node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://studlyf-hr-platform.vercel.app
      - key: GITHUB_REDIRECT_URL
        value: https://studlyf-hr-platform.onrender.com/api/auth/github/callback
